<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Rol de Usuario | Huellitas Alegres</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        form { max-width: 400px; margin-top: 20px; }
        label { display: block; margin-top: 10px; font-weight: bold; }
        select, input { width: 100%; padding: 8px; margin-top: 5px; box-sizing: border-box; }
        .btn { padding: 10px 20px; background-color: #4CAF50; color: white; border: none; cursor: pointer; margin-top: 15px; }
        .btn:hover { background-color: #45a049; }
        h1 { color: #333; }
        .info { background-color: #f9f9f9; padding: 15px; border-radius: 5px; margin-bottom: 20px; }
    </style>
</head>
<body>
    <h1>✏️ Editar Rol de Usuario</h1>
    
    <div class="info">
        <p><strong>Usuario:</strong> {{ target_user.first_name|default:target_user.username }}</p>
        <p><strong>Email:</strong> {{ target_user.email }}</p>
    </div>
    
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Guardar cambios</button>
    </form>
    
    <p><a href="{% url 'usuarios:admin_user_list' %}">← Volver a la lista de usuarios</a></p>
</body>
</html>
