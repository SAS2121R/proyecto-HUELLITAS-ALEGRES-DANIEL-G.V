<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<style>
    @page { size: letter; margin: 2cm; }
    body { font-family: Helvetica, Arial, sans-serif; font-size: 10pt; }
    .header { text-align: center; border-bottom: 2px solid #2c3e50; padding-bottom: 10px; margin-bottom: 20px; }
    .header h1 { color: #2c3e50; margin: 0; font-size: 18pt; }
    .header p { color: #555; margin: 2px 0; font-size: 9pt; }
    .summary-box { background: #ecf0f1; padding: 10px; border-radius: 5px; margin-bottom: 15px; }
    .summary-box h4 { margin: 0 0 8px 0; color: #2c3e50; }
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th { background: #2c3e50; color: white; padding: 8px; text-align: left; font-size: 9pt; }
    td { padding: 6px 8px; border-bottom: 1px solid #ddd; font-size: 9pt; }
    tr:nth-child(even) { background: #f9f9f9; }
    .badge { padding: 3px 8px; border-radius: 3px; font-size: 8pt; font-weight: bold; }
    .badge-success { background: #27ae60; color: white; }
    .badge-warning { background: #f39c12; color: white; }
    .badge-danger { background: #e74c3c; color: white; }
    .footer { text-align: center; font-size: 8pt; color: #999; margin-top: 20px; border-top: 1px solid #ddd; padding-top: 10px; }
</style>
</head>
<body>
<div class="header">
    <h1>Huellitas Alegres</h1>
    <p>NIT 901.234.567-8 | Clinica Veterinaria</p>
    <p>Calle 10 # 25-30, Bogota | Tel: 601-555-0123 | info@huellitasalegres.com</p>
</div>
{% block content %}{% endblock %}
<div class="footer">
    Reporte generado el {% now "d/m/Y H:i" %} | Huellitas Alegres
</div>
</body>
</html>
