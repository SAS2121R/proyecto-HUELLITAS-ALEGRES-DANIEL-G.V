{% extends 'base.html' %}

{% block content %}
<div class="max-w-lg mx-auto">
  <div class="bg-surface-container-lowest rounded-xl border border-error/30 overflow-hidden shadow-[0_4px_20px_rgba(0,0,0,0.03)]">
    <div class="bg-error px-6 py-4">
      <h2 class="font-headline-md text-headline-md text-on-error flex items-center gap-2">
        <span class="material-symbols-outlined">warning</span> Confirmar Eliminación
      </h2>
    </div>
    <div class="p-6">
      <p class="font-body-md text-body-md text-on-surface mb-2">¿Estás seguro de que deseas eliminar la mascota <strong>{{ mascota.nombre }}</strong> ({{ mascota.especie }})?</p>
      <p class="font-caption text-caption text-on-surface-variant mb-6">Esta acción no se puede deshacer.</p>
      <form method="post">
        {% csrf_token %}
        <div class="flex gap-3">
          <a href="{% url 'mascotas:lista' %}" class="flex-1 text-center bg-surface-container-high text-on-surface font-label-md text-label-md rounded-lg px-4 py-2.5 hover:bg-surface-container-highest transition-colors">Cancelar</a>
          <button type="submit" class="flex-1 bg-error text-on-error font-label-md text-label-md rounded-lg px-4 py-2.5 hover:opacity-90 transition-opacity">Sí, eliminar</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
